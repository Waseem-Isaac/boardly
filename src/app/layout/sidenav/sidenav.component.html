<mat-nav-list>
  @for (item of navItems; track item.route) {
    <a
      class="nav-item"
      mat-list-item
      [routerLink]="item.route"
      routerLinkActive="active-nav-item"
    >
      {{item.icon}}
      {{ item.label }}
    </a>
  }


  <a [routerLink]="'/tasks/add'" class="m-4 nav-item action-button" mat-list-item mat-button> 
    <span class="d-flex align-items-center justify-content-center">
      <mat-icon class="d-flex align-items-center justify-content-center">add</mat-icon> 
       New Task
    </span>
  </a>
</mat-nav-list>
